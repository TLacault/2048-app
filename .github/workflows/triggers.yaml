name: TRIGGERS

on:
    push:
        branches: [main]
        paths-ignore:
            - "docs/**"
    pull_request:
        branches:
            - main
            - lab04
        paths-ignore:
            - "docs/**"
    workflow_dispatch:

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Build
              run: pnpm build

            - name: Upload build artifact
              uses: actions/upload-artifact@v6
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              with:
                  name: 2048-app-build
                  path: .output/

    typecheck:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Type checking
              run: pnpm typecheck

    lint:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Lint
              run: pnpm lint

    test:
        runs-on: ubuntu-latest
        needs: build
        if: github.event_name == 'pull_request'
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install

            - name: Run tests
              run: pnpm test
